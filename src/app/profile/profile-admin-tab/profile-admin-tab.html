<section class="admin-panel">
  <div
    *ngIf="toastMessage"
    class="admin-toast"
    [class.success]="toastType === 'success'"
    [class.error]="toastType === 'error'"
  >
    {{ toastMessage }}
  </div>

  <h3 class="admin-title">Gestion de usuarios</h3>

  <input
    type="text"
    class="admin-search-input"
    placeholder="Buscar usuario por @usuario"
    aria-label="Buscar usuario"
    [(ngModel)]="searchTerm"
    (ngModelChange)="onSearchTermChange($event)"
  />

  <p
    class="admin-empty-state"
    *ngIf="!searchTerm.trim() || !searchTerm.trim().startsWith('@')"
  >
    Escribe @ para buscar usuarios
  </p>

  <p
    class="admin-empty-state"
    *ngIf="searchTerm.trim().startsWith('@') && users.length === 0"
  >
    No se han encontrado usuarios
  </p>

  <ul *ngIf="filteredUsers$ | async as filteredUsers" class="admin-users-list">
    <li *ngFor="let user of filteredUsers; trackBy: trackByUserId" class="admin-user-row" data-cy="admin-user-row">
      <div class="admin-user-main">
        <strong>@{{ user.username || 'unknown' }}</strong>
        <span *ngIf="user.name"> - {{ user.name }}</span>
        <span *ngIf="user.role === 'admin'" class="admin-user-badge">Administrador</span>
      </div>
      <button
        *ngIf="user.role !== 'admin'"
        type="button"
        class="admin-delete-btn"
        [disabled]="isDeletingMap[user.id]"
        (click)="onDeleteUser(user)"
      >
        {{ isDeletingMap[user.id] ? 'Eliminando...' : 'Eliminar' }}
      </button>
    </li>
  </ul>
</section>
