<section class="admin-panel">
  <div
    *ngIf="toastMessage"
    class="admin-toast"
    [attr.data-cy]="toastType === 'success' ? 'admin-delete-success' : 'admin-delete-error'"
    [class.success]="toastType === 'success'"
    [class.error]="toastType === 'error'"
  >
    {{ toastMessage }}
  </div>

  <h3 class="admin-title">Gestion de usuarios</h3>

  <input
    type="text"
    class="admin-search-input"
    placeholder="Buscar usuario por @usuario"
    aria-label="Buscar usuario"
    [(ngModel)]="searchTerm"
    (ngModelChange)="onSearchTermChange($event)"
  />

  <p class="admin-empty-state" *ngIf="!searchTerm.trim() || !searchTerm.trim().startsWith('@')">
    Escribe @ para buscar usuarios
  </p>

  <ng-container *ngIf="filteredUsers$ | async as filteredUsers">
    <p
      class="admin-empty-state"
      *ngIf="
        searchTerm.trim().startsWith('@') &&
        searchTerm.trim().slice(1).trim().length >= 2 &&
        filteredUsers.length === 0
      "
    >
      No se han encontrado usuarios
    </p>

    <ul class="admin-users-list">
      <li
        *ngFor="let user of filteredUsers; trackBy: trackByUserId"
        class="admin-user-row"
        data-cy="admin-user-row"
        [attr.data-cy-admin-user-id]="user.id"
        [attr.data-cy-admin-username]="user.username"
      >
        <div class="admin-user-main">
          <strong>@{{ user.username || 'unknown' }}</strong>
          <span *ngIf="user.name"> - {{ user.name }}</span>
          <span *ngIf="user.role === 'admin'" class="admin-user-badge">Administrador</span>
        </div>
        <button
          *ngIf="user.role !== 'admin'"
          type="button"
          class="admin-delete-btn"
          [disabled]="isDeletingMap[user.id]"
          (click)="onDeleteUser(user)"
        >
          {{ isDeletingMap[user.id] ? 'Eliminando...' : 'Eliminar' }}
        </button>
      </li>
    </ul>
  </ng-container>
</section>
