name: Frontend CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@11.1.3 --activate

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "dir=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        # Keep security meaningful: fail only on high/critical advisories so the
        # known moderate Cypress transitive advisory does not break CI.
        run: pnpm audit --audit-level high

      - name: Build production bundle
        env:
          VITE_API_URL: https://devconnect-backend-production-c95f.up.railway.app
        run: pnpm build

      - name: Run unit tests
        run: pnpm exec ng test --watch=false
