name: Cypress E2E

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      backend_url:
        description: Laravel API base URL for Cypress E2E
        required: false
        type: string

permissions:
  contents: read

env:
  CYPRESS_browserBackendUrl: http://127.0.0.1:4200
  CYPRESS_DEFAULT_BACKEND_URL: https://devconnect-backend-production-c95f.up.railway.app
  CYPRESS_adminEmail: ${{ secrets.CYPRESS_ADMIN_EMAIL }}
  CYPRESS_adminPassword: ${{ secrets.CYPRESS_ADMIN_PASSWORD }}

jobs:
  cypress:
    name: Run Cypress E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false
          cache: true

      - name: Cache Cypress binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/Cypress
          key: ${{ runner.os }}-cypress-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-cypress-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve backend URL
        env:
          BACKEND_URL_INPUT: ${{ github.event.inputs.backend_url }}
          BACKEND_URL_VARIABLE: ${{ vars.CYPRESS_BACKEND_URL }}
        run: |
          CYPRESS_backendUrl="${BACKEND_URL_INPUT:-${BACKEND_URL_VARIABLE:-${CYPRESS_DEFAULT_BACKEND_URL:-}}}"

          if [ -z "$CYPRESS_backendUrl" ]; then
            echo "::error title=Missing Cypress backend URL::Set repository variable CYPRESS_BACKEND_URL or pass workflow_dispatch backend_url. The Cypress suite needs a live Laravel backend for Sanctum and API requests."
            exit 1
          fi

          CYPRESS_backendUrl="${CYPRESS_backendUrl%/}"
          echo "CYPRESS_backendUrl=$CYPRESS_backendUrl" >> "$GITHUB_ENV"
          echo "Using backend URL host: $(node -e "console.log(new URL(process.argv[1]).host)" "$CYPRESS_backendUrl")"

      - name: Wait for backend readiness
        run: |
          pnpm exec wait-on --timeout 120000 --interval 2000 --httpTimeout 10000 "$CYPRESS_backendUrl/sanctum/csrf-cookie"

      - name: Run Cypress
        uses: cypress-io/github-action@v7
        with:
          install: false
          command: pnpm cypress:run -- --browser chrome
          start: pnpm dev:ci
          wait-on: http://127.0.0.1:4200
          wait-on-timeout: 120

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

      - name: Upload Cypress videos
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-videos
          path: cypress/videos
          if-no-files-found: ignore
