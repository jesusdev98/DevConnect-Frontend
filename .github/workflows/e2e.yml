name: Cypress E2E

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      backend_url:
        description: Laravel API base URL for Cypress E2E
        required: false
        type: string

permissions:
  contents: read

env:
  CYPRESS_backendUrl: ${{ github.event.inputs.backend_url || vars.CYPRESS_BACKEND_URL }}
  CYPRESS_browserBackendUrl: http://127.0.0.1:4200

jobs:
  cypress:
    name: Run Cypress E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@11.1.3 --activate

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "dir=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: ${{ runner.os }}-cypress-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-cypress-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate backend URL
        run: |
          if [ -z "$CYPRESS_backendUrl" ]; then
            echo "CYPRESS_BACKEND_URL repository variable or workflow_dispatch backend_url input is required."
            echo "This Cypress suite includes real Laravel API/Sanctum specs, so it cannot run frontend-only."
            exit 1
          fi
          CYPRESS_backendUrl="${CYPRESS_backendUrl%/}"
          echo "CYPRESS_backendUrl=$CYPRESS_backendUrl" >> "$GITHUB_ENV"

      - name: Wait for backend readiness
        run: |
          pnpm exec wait-on --timeout 120000 --interval 2000 --httpTimeout 10000 "$CYPRESS_backendUrl/sanctum/csrf-cookie"

      - name: Run Cypress
        uses: cypress-io/github-action@v7
        with:
          install: false
          command: pnpm cypress:run -- --browser chrome
          start: pnpm dev -- --host 127.0.0.1 --port 4200
          wait-on: http://127.0.0.1:4200
          wait-on-timeout: 120

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

      - name: Upload Cypress videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos
          if-no-files-found: ignore
